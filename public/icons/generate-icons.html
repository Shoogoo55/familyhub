<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<!-- Open this file in a browser, right-click the canvases, and save as icon-192.png / icon-512.png -->
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.15;

  // Background
  ctx.fillStyle = '#4f7d4f';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  // Shopping cart icon (white)
  ctx.fillStyle = 'white';
  ctx.strokeStyle = 'white';
  ctx.lineWidth = size * 0.04;
  ctx.lineCap = 'round';

  const cx = size / 2;
  const cy = size / 2;
  const s = size * 0.4;

  // Cart body
  ctx.beginPath();
  ctx.moveTo(cx - s*0.6, cy - s*0.3);
  ctx.lineTo(cx - s*0.35, cy + s*0.2);
  ctx.lineTo(cx + s*0.45, cy + s*0.2);
  ctx.lineTo(cx + s*0.55, cy - s*0.1);
  ctx.lineTo(cx - s*0.4, cy - s*0.1);
  ctx.stroke();

  // Handle
  ctx.beginPath();
  ctx.moveTo(cx - s*0.7, cy - s*0.5);
  ctx.lineTo(cx - s*0.6, cy - s*0.3);
  ctx.stroke();

  // Wheels
  ctx.beginPath();
  ctx.arc(cx - s*0.15, cy + s*0.35, s*0.08, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(cx + s*0.35, cy + s*0.35, s*0.08, 0, Math.PI*2);
  ctx.fill();
}

drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);
</script>
</body>
</html>
